name: Build & Deploy to GCE

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  REPO: climate-repo
  IMAGE: climate-api
  VM_NAME: instance-20260402-055048
  VM_ZONE: asia-northeast3-a

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── test ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Test with Gradle
        run: ./gradlew test

      # ── GCP 인증 ──
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # ── Docker 빌드 & 푸시 ──
      - name: Build and push image
        run: |
          TAG=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}:${GITHUB_SHA::7}
          LATEST=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}:latest

          docker build -t ${TAG} -t ${LATEST} .
          docker push ${TAG}
          docker push ${LATEST}

      # ── VM 배포 ──
      - name: Deploy to GCE
        run: |
          gcloud compute ssh ${VM_NAME} \
            --zone=${VM_ZONE} \
            --command="
              gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet && \
              docker pull ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}:latest && \
              docker stop climate-api || true && \
              docker rm climate-api || true && \
              docker run -d \
                --name climate-api \
                --restart unless-stopped \
                -p 8080:8080 \
                -e TZ=Asia/Seoul \
                -e DB_HOST=10.178.0.5 \
                -e DB_USERNAME=climate_user \
                -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                -e API_KEY=${{ secrets.API_KEY }} \
                -e FIREBASE_SA_PATH=/app/firebase-sa.json \
                -v /home/deploy/firebase-sa.json:/app/firebase-sa.json:ro \
                ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${IMAGE}:latest
            "