spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/climate?serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
    username: ${DB_USERNAME:climate_user}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

api-key: ${API_KEY}
air-quality:
  api-key: ${AIR_QUALITY_API_KEY}

firebase:
  service-account-path: ${FIREBASE_SA_PATH:/app/firebase-sa.json}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      env: prod

logging:
  loki:
    url: ${LOKI_URL:http://loki:3100/loki/api/v1/push}