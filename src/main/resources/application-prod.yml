spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:10.178.0.5}:3306/climate?serverTimezone=Asia/Seoul&rewriteBatchedStatement=true
    username: ${DB_USERNAME:climate_user}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: false

firebase:
  service-account-path: ${FIREBASE_SA_PATH:/app/firebase-sa.json}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      env: prod

logging:
  loki:
    url: ${LOKI_URL:http://monitoring:3100/loki/api/v1/push}